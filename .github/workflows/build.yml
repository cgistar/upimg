name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - name: windows-arm64
            goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist package
          binary="upimg${{ matrix.target.ext }}"
          go build -trimpath -ldflags="-s -w" -o "package/${binary}" ./cmd/upimg

          if [[ "${{ matrix.target.archive }}" == "zip" ]]; then
            (cd package && zip "../dist/upimg-${{ matrix.target.name }}.zip" "${binary}")
          else
            tar -C package -czf "dist/upimg-${{ matrix.target.name }}.tar.gz" "${binary}"
          fi

      - name: Checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > "upimg-${{ matrix.target.name }}.sha256")

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: upimg-${{ matrix.target.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
